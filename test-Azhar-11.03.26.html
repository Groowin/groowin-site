<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: В деңгейі (30 есеп)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #334155; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .option-box { border: 2px solid #f1f5f9; border-radius: 1rem; padding: 1.25rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .option-box:hover { border-color: #0ea5e9; background: #f0f9ff; }
        input[type="radio"]:checked + .option-box { border-color: #0ea5e9; background: #e0f2fe; border-width: 2px; }
        .correct { border-color: #10b981 !important; background: #ecfdf5 !important; }
        .wrong { border-color: #f43f5e !important; background: #fff1f2 !important; }
        .submitted .option-box { pointer-events: none; }
        .timer-badge { background: #0f172a; color: #38bdf8; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-10">

<div id="app" class="max-w-4xl mx-auto">
    <!-- START SCREEN -->
    <div id="start-screen" class="card p-10 text-center border-b-8 border-sky-500">
        <h1 class="text-4xl font-extrabold mb-4 text-slate-900">Физика: 30 Күрделі Есеп</h1>
        <p class="text-slate-500 mb-8 text-lg">Механикалық жұмыс, Қуат, Энергия және ПӘК (В деңгейі)</p>
        
        <div class="mb-10 inline-block px-8 py-4 bg-slate-50 rounded-2xl border border-slate-200">
            <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Уақыт шегі (минут)</label>
            <input type="number" id="time-input" value="60" class="bg-transparent text-4xl font-black text-center w-24 outline-none text-sky-600">
        </div>

        <button onclick="startQuiz()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-5 rounded-2xl text-xl shadow-xl shadow-sky-200 transition-all transform active:scale-95">
            Тестті бастау
        </button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">
        <div class="flex justify-between items-center mb-8 sticky top-4 bg-white/90 backdrop-blur-md p-5 rounded-2xl shadow-lg border border-slate-100 z-50">
            <div class="timer-badge px-6 py-2 rounded-full font-mono text-2xl font-bold" id="timer">60:00</div>
            <div class="text-right">
                <span class="text-xs text-slate-400 font-bold uppercase block">Орындалуы</span>
                <div id="progress" class="text-2xl font-black text-slate-800">0 / 30</div>
            </div>
        </div>

        <div id="questions"></div>

        <button id="submit-btn" onclick="finishQuiz()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-6 rounded-2xl text-2xl mt-10 mb-24 transition-all shadow-2xl">
            Нәтижені тексеру
        </button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden card p-12 text-center">
        <h2 class="text-3xl font-black mb-4">Тест аяқталды!</h2>
        <div id="score" class="text-9xl font-black text-sky-500 mb-6">0 / 30</div>
        <p id="feedback" class="text-xl text-slate-600 mb-10 font-medium"></p>
        <button onclick="location.reload()" class="bg-slate-100 hover:bg-slate-200 text-slate-900 px-12 py-4 rounded-xl font-bold transition">Қайта бастау</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Массасы 2 кг дене 10 м/с жылдамдықпен тік жоғары лақтырылды. Лақтырғаннан 1 с өткендегі оның потенциалдық энергиясы қандай? (g=10)", a: ["100 Дж", "50 Дж", "200 Дж", "0 Дж"], c: 0 },
        { q: "Қуаты 5 кВт қозғалтқыш 2 минутта қандай жұмыс атқарады?", a: ["600 кДж", "10 кДж", "100 кДж", "300 кДж"], c: 0 },
        { q: "Денеге 20 Н күш әсер етіп, оны күш бағытымен 45° бұрыш жасап 10 м-ге жылжытты. Атқарылған жұмыс қандай? (cos45° ≈ 0,7)", a: ["140 Дж", "200 Дж", "100 Дж", "70 Дж"], c: 0 },
        { q: "ПӘК-і 75% көтергіш кран 30 кДж пайдалы жұмыс істеу үшін қанша энергия жұмсайды?", a: ["40 кДж", "22.5 кДж", "30 кДж", "50 кДж"], c: 0 },
        { q: "Массасы 500 г құс 15 м/с жылдамдықпен ұшып барады. Оның кинетикалық энергиясы?", a: ["56.25 Дж", "112.5 Дж", "5.6 Дж", "225 Дж"], c: 0 },
        { q: "Қатаңдығы 500 Н/м серіппені 10 см-ге созу үшін қандай жұмыс істеу керек?", a: ["2.5 Дж", "5 Дж", "25 Дж", "50 Дж"], c: 0 },
        { q: "Массасы 40 кг бала сатымен 5 м биіктікке 10 секундта көтерілді. Баланың қуаты қандай? (g=10)", a: ["200 Вт", "400 Вт", "20 Вт", "2000 Вт"], c: 0 },
        { q: "Дененің кинетикалық энергиясы 100 Дж, жылдамдығы 5 м/с. Дененің импульсі қандай?", a: ["40 кг·м/с", "20 кг·м/с", "10 кг·м/с", "50 кг·м/с"], c: 0 },
        { q: "ПӘК-і 40% жылу қозғалтқышы 1200 Дж пайдалы жұмыс істесе, қоршаған ортаға қанша жылу береді?", a: ["1800 Дж", "3000 Дж", "800 Дж", "2000 Дж"], c: 0 },
        { q: "Биіктігі 10 м балконнан массасы 1 кг тас еркін құлайды. Жерден 2 м биіктіктегі тастың кинетикалық энергиясы?", a: ["80 Дж", "20 Дж", "100 Дж", "50 Дж"], c: 0 },
        { q: "Күш моменті 20 Н·м болатын иінді 5 айналым жасау үшін қандай жұмыс істеледі? (A = M·2π·n, π ≈ 3)", a: ["600 Дж", "100 Дж", "300 Дж", "1200 Дж"], c: 0 },
        { q: "Автокөлік 1000 Н кедергі күшіне қарсы 72 км/сағ тұрақты жылдамдықпен қозғалады. Қозғалтқыш қуаты?", a: ["20 кВт", "72 кВт", "10 кВт", "2 кВт"], c: 0 },
        { q: "Егер дененің массасын 2 есе азайтып, жылдамдығын 4 есе арттырсақ, кинетикалық энергия қалай өзгереді?", a: ["8 есе артады", "4 есе артады", "16 есе артады", "2 есе артады"], c: 0 },
        { q: "ПӘК-і 90% трансформатордың бірінші реттік орамына 100 Дж энергия берілсе, екінші реттік орамдағы энергия?", a: ["90 Дж", "110 Дж", "10 Дж", "100 Дж"], c: 0 },
        { q: "Массасы 60 кг спортшы биіктігі 50 см болатын 20 рет секіру жасады. Ол қандай жұмыс атқарды? (g=10)", a: ["6000 Дж", "600 Дж", "3000 Дж", "12000 Дж"], c: 0 },
        { q: "Қуаты 1.5 кВт сорғы 1 сағатта қанша жұмыс істейді?", a: ["5.4 МДж", "1.5 кДж", "90 кДж", "1.5 МДж"], c: 0 },
        { q: "Доп 5 м биіктіктен жерге түсіп, қайтадан 3 м-ге секірді. Соққы кезінде энергияның қанша пайызы жоғалды?", a: ["40%", "60%", "20%", "25%"], c: 0 },
        { q: "Дене 20 м биіктіктен 10 м/с бастапқы жылдамдықпен төмен лақтырылды. Жерге түскендегі жылдамдығы? (g=10)", a: ["≈ 22.4 м/с", "20 м/с", "30 м/с", "15 м/с"], c: 0 },
        { q: "ПӘК-і 20% қол фонары 1 минутта 120 Дж жарық энергиясын берсе, батареяның қуаты қандай?", a: ["10 Вт", "2 Вт", "12 Вт", "20 Вт"], c: 0 },
        { q: "Массасы 100 т пойызды 0.2 м/с² үдеумен қозғалту үшін 50 м жолда қандай жұмыс істеледі? (Кедергісіз)", a: ["1 МДж", "100 кДж", "500 кДж", "5 МДж"], c: 0 },
        { q: "Серіппелі тапаншаның серіппесін 5 см-ге қысқанда, 10 г оқ 20 м/с жылдамдықпен ұшады. Қатаңдығы?", a: ["1600 Н/м", "800 Н/м", "2000 Н/м", "400 Н/м"], c: 0 },
        { q: "Жүкті 4 м биіктікке көтергенде 10% энергия үйкеліске кетті. Егер пайдалы жұмыс 360 Дж болса, толық жұмыс?", a: ["400 Дж", "396 Дж", "324 Дж", "500 Дж"], c: 0 },
        { q: "Қуаты 200 Вт желдеткіш 5 минутта ауаға қандай кинетикалық энергия береді?", a: ["60 кДж", "1 кДж", "1000 Дж", "12 кДж"], c: 0 },
        { q: "Егер дененің потенциалдық энергиясы 3 есе артса, оның биіктігі қалай өзгерген?", a: ["3 есе артқан", "9 есе артқан", "көлеміне байланысты", "өзгермеген"], c: 0 },
        { q: "Массасы 5 кг дененің импульсі 20 кг·м/с. Оның кинетикалық энергиясы?", a: ["40 Дж", "80 Дж", "20 Дж", "100 Дж"], c: 0 },
        { q: "Автокөлік қозғалтқышының қуаты 60 кВт, ПӘК-і 30%. Ол 1 секундта қанша жылу энергиясын жұмсайды?", a: ["200 кДж", "180 кДж", "20 кДж", "60 кДж"], c: 0 },
        { q: "Массасы 2 кг еркін құлап жатқан дененің жолдың ортасындағы кинетикалық энергиясы 200 Дж болса, бастапқы биіктігі?", a: ["20 м", "10 м", "40 м", "5 м"], c: 0 },
        { q: "Жүк көтергіштің ПӘК-і 80%. Ол 400 кг жүкті 5 м биіктікке көтеру үшін қандай жұмыс істейді? (g=10)", a: ["25 000 Дж", "20 000 Дж", "16 000 Дж", "32 000 Дж"], c: 0 },
        { q: "100 Н күш әсерінен дене 2 м/с жылдамдықпен қозғалса, 10 секундтағы жұмыс?", a: ["2000 Дж", "200 Дж", "1000 Дж", "20 000 Дж"], c: 0 },
        { q: "Серіппенің потенциалдық энергиясы 4 Дж. Егер оны тағы 2 есе қаттырақ созса, энергиясы қандай болады?", a: ["16 Дж", "8 Дж", "12 Дж", "4 Дж"], c: 0 }
    ];

    let timerInterval;
    let timeLeft;

    function startQuiz() {
        const input = document.getElementById('time-input').value;
        timeLeft = input * 60;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        const qContainer = document.getElementById('questions');
        questions.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = "card p-8 mb-6 transition-all";
            div.innerHTML = `
                <div class="flex items-center mb-6">
                    <span class="w-10 h-10 flex items-center justify-center bg-slate-900 text-white rounded-full font-bold text-sm mr-4">${idx + 1}</span>
                    <p class="text-xl font-bold text-slate-800 leading-tight">${item.q}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${item.a.map((opt, i) => `
                        <label class="cursor-pointer">
                            <input type="radio" name="q${idx}" value="${i}" class="hidden peer" onchange="updateProgress()">
                            <div class="option-box peer-checked:border-sky-500">
                                <span class="font-semibold">${opt}</span>
                            </div>
                        </label>
                    `).join('')}
                </div>
            `;
            qContainer.appendChild(div);
        });

        timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${String(s).padStart(2, '0')}`;
            if (timeLeft <= 0) finishQuiz();
        }, 1000);
    }

    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        document.getElementById('progress').innerText = `${answered} / 30`;
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        window.scrollTo({top: 0, behavior: 'smooth'});
        
        let score = 0;
        document.getElementById('quiz-screen').classList.add('submitted');
        
        questions.forEach((item, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const options = document.getElementsByName(`q${idx}`);
            
            options[item.c].nextElementSibling.classList.add('correct');
            
            if (selected) {
                if (parseInt(selected.value) === item.c) {
                    score++;
                } else {
                    selected.nextElementSibling.classList.add('wrong');
                }
            }
        });

        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score').innerText = `${score} / 30`;
        
        let feedback = "Көбірек дайындалу керек. Формулаларды қайталаңыз.";
        if (score > 25) feedback = "Керемет! Сіз тақырыпты өте жақсы меңгергенсіз.";
        else if (score > 15) feedback = "Жақсы нәтиже, бірақ кейбір есептерде қателіктер бар.";
        document.getElementById('feedback').innerText = feedback;
    }
</script>
</body>
</html>
