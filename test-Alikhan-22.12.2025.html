<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: Күрделі деңгей (B & C)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        body { background-color: #f1f5f9; font-family: 'Montserrat', sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .option-box { border: 2px solid #e2e8f0; border-radius: 0.75rem; padding: 1rem; cursor: pointer; transition: 0.2s; position: relative; }
        .option-box:hover { border-color: #2563eb; background-color: #f8faff; }
        input[type="radio"]:checked + .option-box { border-color: #2563eb; background-color: #eff6ff; font-weight: 600; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .level-tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .tag-b { background: #fef9c3; color: #854d0e; }
        .tag-c { background: #fee2e2; color: #991b1b; }
        .context-block { border: 2px solid #3b82f6; background: #f0f7ff; }
        /* Disable clicks after submission */
        .submitted .option-box { cursor: default; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">

<div id="app" class="max-w-4xl mx-auto">
    <!-- Бастау экраны -->
    <div id="start-screen" class="card p-12 text-center border-b-8 border-blue-600">
        <h1 class="text-4xl font-black text-gray-900 mb-6">Физика: B және C деңгейі</h1>
        <div class="bg-blue-50 p-8 rounded-2xl text-left mb-10 space-y-4">
            <p class="flex items-center gap-2">🚀 <strong>Жалпы сұрақ саны:</strong> 35</p>
            <p class="flex items-center gap-2">📊 <strong>Деңгейлер:</strong> 20-B (Орташа), 15-C (Күрделі)</p>
            <p class="flex items-center gap-2">📉 <strong>Контекст:</strong> 30-35 сұрақтар график бойынша</p>
            
            <div class="mt-6 p-4 bg-white rounded-xl border-2 border-blue-200">
                <label class="block text-sm font-bold text-blue-900 mb-2 uppercase tracking-wider">⏱️ Тест уақытын орнату (минут):</label>
                <input type="number" id="custom-timer" value="60" min="1" max="180" class="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none text-xl font-bold">
            </div>
        </div>
        <button onclick="startQuiz()" class="bg-blue-600 text-white px-16 py-5 rounded-2xl font-bold text-2xl hover:bg-blue-700 shadow-2xl transition transform active:scale-95">
            Тестті бастау
        </button>
    </div>

    <!-- Тест экраны -->
    <div id="quiz-screen" class="hidden">
        <div class="sticky top-4 z-50 bg-white/90 backdrop-blur p-4 border rounded-2xl shadow-xl flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <span class="text-xs font-black uppercase text-gray-400">Уақыт:</span>
                <div id="timer" class="text-3xl font-mono font-black text-blue-600">60:00</div>
            </div>
            <div id="progress" class="text-sm font-bold text-blue-900 bg-blue-100 px-4 py-2 rounded-full">Сұрақ: 0/35</div>
        </div>

        <div id="questions-container"></div>

        <div id="action-area" class="pb-20">
            <button id="submit-btn" onclick="checkAnswers()" class="w-full bg-gray-900 text-white py-6 rounded-2xl font-black text-2xl mt-10 shadow-2xl hover:bg-black transition transform active:scale-95">
                Нәтижені жіберу
            </button>
        </div>
    </div>

    <!-- Нәтиже -->
    <div id="result-screen" class="hidden card p-12 text-center border-t-8 border-green-500 mb-10">
        <h2 class="text-3xl font-black mb-6">Тест қорытындысы</h2>
        <div id="final-score" class="text-8xl font-black text-blue-600 mb-6">0 / 35</div>
        <div id="stats" class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-yellow-50 rounded-xl"><p class="text-xs font-bold uppercase text-yellow-600">B деңгейі</p><span id="score-b" class="text-2xl font-black">0/20</span></div>
            <div class="p-4 bg-red-50 rounded-xl"><p class="text-xs font-bold uppercase text-red-600">C деңгейі</p><span id="score-c" class="text-2xl font-black">0/15</span></div>
        </div>
        <p id="feedback" class="text-xl font-bold text-gray-700 mb-10"></p>
        <div class="flex flex-col gap-4">
            <p class="text-sm text-slate-500">Төменде қателер мен дұрыс жауаптарды тексере аласыз 👇</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-12 py-4 rounded-xl font-bold text-lg hover:bg-blue-700">Жаңа тест бастау</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        // B деңгейі (20 сұрақ)
        { l: 'b', q: "Массасы 5 кг дене 10 м/с жылдамдықпен қозғалады. Егер оған қозғалыс бағытымен 20 Н күш 3 секунд бойы әсер етсе, оның соңғы жылдамдығы қандай болады?", a: ["22 м/с", "12 м/с", "15 м/с", "25 м/с"], c: 0 },
        { l: 'b', q: "Күш иіні 0,4 м, ал күш моменті 10 Н·м болса, әсер етуші күштің мәнін табыңыз.", a: ["25 Н", "4 Н", "40 Н", "0,04 Н"], c: 0 },
        { l: 'b', q: "Массасы 2 кг денеге 30° бұрышпен 50 Н күш әсер етіп, оны 4 м-ге жылжытты. Атқарылған жұмыс қандай? (cos 30° = 0.866)", a: ["173,2 Дж", "200 Дж", "100 Дж", "86,6 Дж"], c: 0 },
        { l: 'b', q: "Гидравликалық престің поршеньдерінің аудандары 5 см² және 200 см². Кіші поршеньге 50 Н күш түссе, үлкен поршень қандай күш береді?", a: ["2000 Н", "1000 Н", "250 Н", "4000 Н"], c: 0 },
        { l: 'b', q: "Салмағы 800 Н адам лифт ішінде 2 м/с² үдеумен төмен түсіп келеді. Оның салмағы қалай өзгереді? (g=10)", a: ["640 Н", "960 Н", "800 Н", "160 Н"], c: 0 },
        { l: 'b', q: "ПӘК-і 75% механизм көмегімен 1500 Дж жұмыс істелді. Пайдалы жұмыс неге тең?", a: ["1125 Дж", "2000 Дж", "1875 Дж", "1200 Дж"], c: 0 },
        { l: 'b', q: "Қатаңдығы 500 Н/м серіппеге ілінген 2 кг жүктің тербеліс жиілігін табыңыз. (π ≈ 3.14)", a: ["~2,5 Гц", "5 Гц", "10 Гц", "1,2 Гц"], c: 0 },
        { l: 'b', q: "Автомобиль 72 км/сағ жылдамдықпен қозғалып келеді. Оның моторының қуаты 20 кВт болса, тарту күші неге тең?", a: ["1000 Н", "3600 Н", "100 Н", "277 Н"], c: 0 },
        { l: 'b', q: "Тығыздығы 800 кг/м³ сұйықтың 5 м тереңдіктегі гидростатикалық қысымын табыңыз. (g=10)", a: ["40 кПа", "4 кПа", "400 кПа", "8 кПа"], c: 0 },
        { l: 'b', q: "Массасы 500 г доп 10 м биіктіктен жерге түсіп, қайтадан 6 м биіктікке секірді. Импульс өзгерісінің модулі? (g=10)", a: ["~12,5 кг·м/с", "5 кг·м/с", "10 кг·м/с", "2 кг·м/с"], c: 0 },
        { l: 'b', q: "Жылжымалы блок көмегімен 600 Н жүкті 4 м биіктікке көтерді. Жұмсалған күш пен жіптің ұзындығы? (үйкеліссіз)", a: ["300 Н, 8 м", "600 Н, 4 м", "1200 Н, 2 м", "300 Н, 4 м"], c: 0 },
        { l: 'b', q: "Ұзындығы 1 м математикалық маятниктің айдағы периоды қандай? (g_ай = 1,6 м/с²)", a: ["~5 с", "2 с", "6,28 с", "3,14 с"], c: 0 },
        { l: 'b', q: "Күш моменті 24 Н·м, ал күш 60 Н. Күш иінін табыңыз.", a: ["0,4 м", "2,5 м", "1440 м", "0,25 м"], c: 0 },
        { l: 'b', q: "Дененің кинетикалық энергиясы 400 Дж, жылдамдығы 20 м/с болса, оның массасы қанша?", a: ["2 кг", "1 кг", "0,5 кг", "4 кг"], c: 0 },
        { l: 'b', q: "Судың бетінде жүзіп жүрген мұз кесегінің көлемі 2 м³. Оның су астындағы бөлігінің көлемі? (ρ_мұз=900, ρ_су=1000)", a: ["1,8 м³", "0,2 м³", "1 м³", "1,9 м³"], c: 0 },
        { l: 'b', q: "Массасы 100 кг арбаша 2 м/с жылдамдықпен қозғалып келе жатып, қарсы алдынан 1 м/с жылдамдықпен келе жатқан 50 кг арбашамен соқтығысып, бірге қозғалды. Жылдамдық?", a: ["1 м/с", "1,5 м/с", "0,5 м/с", "2 м/с"], c: 0 },
        { l: 'b', q: "Механиканың алтын ережесіне сай, күштен 4 есе ұтсақ, қашықтықтан қалай ұтыламыз?", a: ["4 есе ұтыламыз", "2 есе ұтыламыз", "Ұтылмаймыз", "16 есе ұтыламыз"], c: 0 },
        { l: 'b', q: "Дене 20 м биіктіктен еркін құлады. Орта жолдағы (10 м) жылдамдығы?", a: ["~14,1 м/с", "10 м/с", "20 м/с", "5 м/с"], c: 0 },
        { l: 'b', q: "Серіппе 2 см-ге ұзарғанда 4 Дж энергия жинады. Серіппе қатаңдығы?", a: ["20000 Н/м", "2000 Н/м", "400 Н/м", "800 Н/м"], c: 0 },
        { l: 'b', q: "Ыдыстың түбіне түсетін қысым 5 кПа. Егер сұйықтың тығыздығы 1000 кг/м³ болса, биіктігі?", a: ["0,5 м", "5 м", "50 см", "2 м"], c: 0 },

        // C деңгейі (9 сұрақ + 6 контекст = 15 сұрақ)
        { l: 'c', q: "Массасы 200 кг жүк жылжымалы блок арқылы 1 м/с² үдеумен жоғары көтерілуде. Жіптің керілу күші? (g=10)", a: ["1100 Н", "2200 Н", "1000 Н", "1050 Н"], c: 0 },
        { l: 'c', q: "Лифт төбесіне ілінген маятниктің периоды, лифт 2,5 м/с² үдеумен жоғары көтерілгенде қалай өзгереді?", a: ["~1.1 есе кемиді", "1.25 есе артады", "Өзгермейді", "2 есе кемиді"], c: 0 },
        { l: 'c', q: "Көлемі 0,1 м³ дене суға толық батырылған. Оның салмағы су ішінде 500 Н болса, оның тығыздығы қандай? (ρ_су=1000)", a: ["1500 кг/м³", "2000 кг/м³", "1100 кг/м³", "1050 кг/м³"], c: 0 },
        { l: 'c', q: "Массасы 10 кг денеге 20 Н күш горизонтқа 60° бұрышпен әсер етеді. Үйкеліс коэффициенті 0,1 болса, дененің үдеуі қандай?", a: ["0,17 м/с²", "1 м/с²", "0,5 м/с²", "2 м/с²"], c: 0 },
        { l: 'c', q: "Екі серіппені (k1=200, k2=300) тізбектей жалғағандағы жалпы қатаңдық?", a: ["120 Н/м", "500 Н/м", "100 Н/m", "600 Н/м"], c: 0 },
        { l: 'c', q: "Математикалық маятник периоды 2 с. Егер оның ұзындығын 40 см-ге қысқартса, периоды 1 с болды. Бастапқы ұзындығы?", a: ["~53 см", "80 см", "40 см", "100 см"], c: 0 },
        { l: 'c', q: "Горизонтқа бұрышпен лақтырылған дененің ең жоғарғы нүктесіндегі кинетикалық энергиясы бастапқының жартысына тең болса, лақтыру бұрышы қандай?", a: ["45°", "30°", "60°", "0°"], c: 0 },
        { l: 'c', q: "Қозғалтқыш ПӘК-і 40%. Ол 20 кДж пайдалы жұмыс істеу үшін қанша энергия жұмсайды?", a: ["50 кДж", "8 кДж", "100 кДж", "40 кДж"], c: 0 },
        { l: 'c', q: "Асқын салмақ коэффициенті 3-ке тең болу үшін ракета қандай үдеумен жоғары көтерілуі керек?", a: ["20 м/с²", "30 м/с²", "10 м/с²", "40 м/с²"], c: 0 },

        // Контекст (30-35 сұрақтар) - График бойынша
        { l: 'c', isContext: true, q: "30. Графикке қарап, тербеліс амплитудасын (X_m) анықтаңыз.", a: ["6 м", "12 м", "20 м", "25 м"], c: 0 },
        { l: 'c', isContext: true, q: "31. Тербеліс периодын (T) график бойынша табыңыз.", a: ["20 с", "10 с", "5 с", "25 с"], c: 0 },
        { l: 'c', isContext: true, q: "32. Циклдік жиілікті (ω) есептеңіз.", a: ["0.1π рад/с", "0.2π рад/с", "10π рад/с", "2π рад/с"], c: 0 },
        { l: 'c', isContext: true, q: "33. Тербелістің математикалық теңдеуін (гармоникалық заңын) құрыңыз.", a: ["x = 6 cos(0.1π t)", "x = 6 sin(0.1π t)", "x = 6 cos(20t)", "x = 20 cos(6t)"], c: 0 },
        { l: 'c', isContext: true, q: "34. t = 10 с уақыт мезетіндегі дененің координатасын табыңыз.", a: ["-6 м", "0 м", "6 м", "4 м"], c: 0 },
        { l: 'c', isContext: true, q: "35. Тербеліс жиілігі (ν) неге тең?", a: ["0.05 Гц", "0.1 Гц", "20 Гц", "5 Гц"], c: 0 }
    ];

    let timerValue = 60 * 60;
    let timerInterval;

    function startQuiz() {
        const customTime = document.getElementById('custom-timer').value;
        if (customTime && customTime > 0) {
            timerValue = parseInt(customTime) * 60;
        }

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestions();
        startTimer();
    }

    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        timerInterval = setInterval(() => {
            timerValue--;
            const m = Math.floor(timerValue / 60);
            const s = timerValue % 60;
            timerDisplay.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            
            if (timerValue <= 300) { // Last 5 minutes red
                timerDisplay.classList.replace('text-blue-600', 'text-red-600');
            }

            if (timerValue <= 0) {
                clearInterval(timerInterval);
                checkAnswers();
            }
        }, 1000);
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = ""; // Clear
        questions.forEach((item, idx) => {
            if (idx === 29) { // Context block
                const ctxHeader = document.createElement('div');
                ctxHeader.className = 'card p-8 mb-8 context-block';
                ctxHeader.innerHTML = `
                    <h2 class="text-2xl font-black text-blue-800 mb-6">КОНТЕКСТ: ТЕРБЕЛІС ГРАФИГІ (30-35)</h2>
                    <div class="bg-white p-4 rounded-xl shadow-inner border border-blue-200">
                        <svg viewBox="0 0 450 220" class="w-full h-auto">
                            <path d="M 40 40 H 400 M 40 70 H 400 M 40 100 H 400 M 40 130 H 400 M 40 160 H 400" stroke="#f1f5f9" stroke-width="1"/>
                            <path d="M 40 40 V 160 M 90 40 V 160 M 140 40 V 160 M 190 40 V 160 M 240 40 V 160 M 290 40 V 160 M 340 40 V 160 M 390 40 V 160" stroke="#f1f5f9" stroke-width="1"/>
                            <line x1="20" y1="100" x2="420" y2="100" stroke="#475569" stroke-width="2" />
                            <line x1="40" y1="10" x2="40" y2="190" stroke="#475569" stroke-width="2" />
                            <text x="420" y="115" class="text-[12px] font-bold" fill="#475569">t, c</text>
                            <text x="10" y="20" class="text-[12px] font-bold" fill="#475569">x, м</text>
                            <path d="M 40 40 Q 90 40 90 100 T 140 160 T 190 100 T 240 40 T 290 100 T 340 160 T 390 100" fill="none" stroke="#2563eb" stroke-width="3" />
                            <text x="45" y="45" class="text-[11px] font-black" fill="#1e293b">6</text>
                            <text x="45" y="75" class="text-[10px]" fill="#94a3b8">4</text>
                            <text x="45" y="135" class="text-[10px]" fill="#94a3b8">-4</text>
                            <text x="45" y="165" class="text-[11px] font-black" fill="#1e293b">-6</text>
                            <text x="85" y="115" class="text-[11px] font-black" fill="#1e293b">5</text>
                            <text x="135" y="115" class="text-[11px] font-black" fill="#1e293b">10</text>
                            <text x="185" y="115" class="text-[11px] font-black" fill="#1e293b">15</text>
                            <text x="235" y="115" class="text-[11px] font-black" fill="#1e293b">20</text>
                            <text x="285" y="115" class="text-[11px] font-black" fill="#1e293b">25</text>
                        </svg>
                    </div>
                `;
                container.appendChild(ctxHeader);
            }

            const qDiv = document.createElement('div');
            qDiv.id = `q-block-${idx}`;
            qDiv.className = 'card p-8 mb-6 border-l-8 ' + (item.l === 'c' ? 'border-red-500' : 'border-yellow-400');
            qDiv.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <span class="level-tag tag-${item.l}">${item.l} деңгейі</span>
                    <span class="text-slate-300 font-black text-xl">#${idx + 1}</span>
                </div>
                <p class="text-xl font-bold text-slate-800 mb-8 leading-relaxed">${item.q}</p>
                <div class="grid gap-4 options-list">
                    ${item.a.map((ans, i) => `
                        <label class="block group">
                            <input type="radio" name="q${idx}" value="${i}" class="hidden peer">
                            <div class="option-box peer-checked:border-blue-600 peer-checked:bg-blue-50">
                                ${ans}
                                <div class="feedback-icon absolute right-4 top-1/2 -translate-y-1/2 hidden"></div>
                            </div>
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(qDiv);
        });
        document.getElementById('progress').innerText = `Сұрақ: 35/35`;
    }

    function checkAnswers() {
        clearInterval(timerInterval);
        let score = 0;
        let scoreB = 0;
        let scoreC = 0;

        const container = document.getElementById('questions-container');
        container.classList.add('submitted');

        questions.forEach((item, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const options = document.getElementsByName(`q${idx}`);
            const block = document.getElementById(`q-block-${idx}`);
            
            // Mark correct answer always
            options[item.c].nextElementSibling.classList.add('correct');
            options[item.c].nextElementSibling.querySelector('.feedback-icon').innerHTML = `
                <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
            `;
            options[item.c].nextElementSibling.querySelector('.feedback-icon').classList.remove('hidden');

            if (selected) {
                const val = parseInt(selected.value);
                if (val === item.c) {
                    score++;
                    if (item.l === 'b') scoreB++; else scoreC++;
                } else {
                    // Mark wrong selection
                    selected.nextElementSibling.classList.add('wrong');
                    selected.nextElementSibling.querySelector('.feedback-icon').innerHTML = `
                        <div class="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center">
                            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                        </div>
                    `;
                    selected.nextElementSibling.querySelector('.feedback-icon').classList.remove('hidden');
                }
            } else {
                // Not answered
                block.classList.add('bg-slate-50', 'opacity-80');
            }
        });

        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        document.getElementById('final-score').innerText = `${score} / 35`;
        document.getElementById('score-b').innerText = `${scoreB} / 20`;
        document.getElementById('score-c').innerText = `${scoreC} / 15`;
        
        const pct = (score / 35) * 100;
        let msg = "";
        if (pct >= 85) msg = "Керемет! Сіздің біліміңіз өте жоғары.";
        else if (pct >= 60) msg = "Жақсы нәтиже. Қателерді төменнен тексеріп көріңіз.";
        else msg = "Тағы да дайындалу керек. Қате жауаптарды талдаңыз.";
        
        document.getElementById('feedback').innerText = msg;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
